name: healer

on:
  # 方案 A:定期輪詢
  schedule:
    - cron: "0 8 * * *"          # 每天 8:00 (UTC)
  # 方案 B:repository_dispatch(如果你選方案 B,把上面的 schedule 註解掉,用這個)
  # repository_dispatch:
  #   types: [auto-heal]
  workflow_dispatch:                # 手動觸發(測試用)

# 避免舊 healer 還在跑
concurrency:
  group: healer-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  poll-and-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET_REPO: gcl858/OpenDataMonitor
      HEALER_TOKEN: ${{ secrets.HEALER_TOKEN }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      OMP_MODEL: MiniMax-M3
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        #with:
        #  repository: gcl858/OpenDataMonitor-Healer
        #  token: ${{ secrets.HEALER_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install oh-my-pi
        run: curl -fsSL https://omp.sh/install | sh

      - name: Verify omp
        run: |
          set -e
          omp --version
          test -n "$OMP_MODEL" || (echo "::error::OMP_MODEL not set" && exit 1)
          echo "✓ omp ready, model=$OMP_MODEL"

      - name: Ensure healer labels exist on target repo
        env:
          GH_TOKEN: ${{ secrets.HEALER_TOKEN }}
        run: |
          # 這三個 label 對應 dispatch_omp.py 的 LABEL_IN_PROGRESS / LABEL_HEALED / LABEL_BLOCKED
          # 已存在時 gh 會 error,我們用 || true 吞掉
          gh label create "healer-in-progress" --repo "$TARGET_REPO" \
            --color "FBCA04" --description "healer is currently working on this issue" \
            2>/dev/null || true
          gh label create "healed" --repo "$TARGET_REPO" \
            --color "0E8A16" --description "healer auto-fixed this issue and opened a PR" \
            2>/dev/null || true
          gh label create "healer-blocked" --repo "$TARGET_REPO" \
            --color "D93F0B" --description "healer opened a PR but it cannot merge (conflict / CI red / already merged); needs human" \
            2>/dev/null || true

      # - name: run batch
      #   run: |
      #     chmod +x ./omp_batch.sh
      #     ./omp_batch.sh < audit.txt

      - name: Poll issues
        id: poll
        run: |
          set -e
          ISSUES=$(python scripts/poll_issues.py)
          echo "issues=$ISSUES"
          echo "issue_list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Heal each issue
        if: steps.poll.outputs.issue_list != '[]'
        env:
          ISSUE_LIST: ${{ steps.poll.outputs.issue_list }}
        run: python scripts/dispatch_omp.py "$ISSUE_LIST"

      - name: Upload omp logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omp-logs-${{ github.run_id }}
          path: /tmp/healer-workspace/omp-issue-*.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify on no-op
        if: steps.poll.outputs.issue_list == '[]'
        run: echo "✅ No auto-heal issues, exiting."

      # ---- 失敗時通知(telegram,可選)----
      - name: Notify on failure
        if: failure()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=⚠️ healer.yml 失敗了: ${{ github.run_id }}"
          else
            echo "Telegram secrets not set; skipping notification."
          fi
